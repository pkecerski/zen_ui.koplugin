name: LuaCheck

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  luacheck:
    name: LuaCheck (warnings allowed)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run LuaCheck gate
        uses: ./.github/actions/luacheck-gate
        with:
          lua-version: "5.1"
          targets: "_meta.lua main.lua common config modules"
